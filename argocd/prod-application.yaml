apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cigna-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/TIRUMALA9999/cigna-gitops.git
    targetRevision: HEAD
    path: apps/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

  ignoreDifferences:
  - group: apps
    kind: Deployment
    name: cigna-nginx
    namespace: prod
    jsonPointers:
    - /spec/replicas
