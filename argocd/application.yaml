apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: cigna-nginx
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/<your-user>/cigna-gitops.git
    targetRevision: HEAD
    path: apps/nginx

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
