apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: cigna-nginx
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/TIRUMALA9999/cigna-gitops.git
    targetRevision: HEAD
    path: apps/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

  ignoreDifferences:
  - group: apps
    kind: Deployment
    name: cigna-nginx
    namespace: dev
    jsonPointers:
    - /spec/replicas
