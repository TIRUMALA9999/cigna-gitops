apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cigna-cluster-resources
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/TIRUMALA9999/cigna-gitops.git
    targetRevision: HEAD
    path: apps/cluster

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
