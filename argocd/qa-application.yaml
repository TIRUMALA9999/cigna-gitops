apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cigna-qa
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/TIRUMALA9999/cigna-gitops.git
    targetRevision: HEAD
    path: apps/qa

  destination:
    server: https://kubernetes.default.svc
    namespace: qa

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

  ignoreDifferences:
  - group: apps
    kind: Deployment
    name: cigna-nginx
    namespace: qa
    jsonPointers:
    - /spec/replicas
