apiVersion: apps/v1
kind: Deployment
metadata:
  name: cigna-nginx
  namespace: dev

spec:
  replicas: 3

  selector:
    matchLabels:
      app: cigna-nginx

  template:
    metadata:
      labels:
        app: cigna-nginx

    spec:
      containers:
      - name: cigna-nginx
        image: cignadevacr001.azurecr.io/cigna-nginx:v1

        ports:
        - containerPort: 80
