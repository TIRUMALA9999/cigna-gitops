apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cigna-nginx-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
  - name: cigna-nginx.rules
    rules:
    - alert: CignaNginxPodDown
      expr: kube_deployment_status_replicas_available{namespace="dev",deployment="cigna-nginx"} < 1
      for: 1m
      labels:
        severity: critical
        team: platform
      annotations:
        summary: "Cigna nginx application has no available pods"
        description: "Deployment cigna-nginx in dev namespace has less than 1 available replica for more than 1 minute."
